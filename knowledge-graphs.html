<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Knowledge Graphs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7000ff;
            --accent-blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 10%, rgba(112, 0, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(0, 212, 255, 0.08) 0%, transparent 50%);
        }

        nav {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .logo { font-weight: 800; letter-spacing: 2px; font-size: 1.2rem; background: linear-gradient(to right, #fff, var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        main { flex: 1; display: flex; position: relative; }

        #cy { flex: 1; width: 100%; height: 100%; background: rgba(0,0,0,0.2); }

        .sidebar {
            position: absolute;
            left: 20px;
            top: 20px;
            width: 300px;
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(30px);
            padding: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .concept-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 12px;
            display: none;
        }

        .btn-generate {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #loader {
            position: absolute;
            inset: 0;
            background: rgba(5,5,5,0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid var(--glass-border);
            border-top: 3px solid var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .controls {
            position: absolute;
            right: 20px;
            bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-size: 0.9rem;">Building Knowledge Map...</p>
    </div>

    <nav>
        <div class="logo-area" onclick="location.href='dashboard.html'">
            <i data-lucide="arrow-left" size="20"></i>
            <span class="logo">LUMINA</span>
        </div>
        <div style="text-align: right;">
            <div id="chapter-name" style="font-weight: 600; font-size: 0.9rem;">Chapter View</div>
            <div id="subject-name" style="color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase;">Subject</div>
        </div>
    </nav>

    <main>
        <div class="sidebar">
            <h3 style="font-size: 1rem;">Concept Linker</h3>
            <p style="font-size: 0.8rem; color: var(--text-dim);">Visualizing how your current chapter connects to the broader world.</p>
            
            <button class="btn-generate" id="gen-btn" onclick="generateGraph()">
                <i data-lucide="zap" size="16"></i>
                Generate Map
            </button>

            <div id="concept-card" class="concept-card">
                <h4 id="node-label" style="color: var(--accent-blue); margin-bottom: 5px;">Concept</h4>
                <div id="node-tag" style="font-size: 0.65rem; background: var(--accent-purple); padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 8px;">SUBJECT</div>
                <p id="node-desc" style="font-size: 0.8rem; line-height: 1.4; color: var(--text-dim);"></p>
            </div>
        </div>

        <div id="cy"></div>

        <div class="controls">
            <button class="control-btn" onclick="cy.fit()"><i data-lucide="maximize" size="18"></i></button>
            <button class="control-btn" onclick="cy.zoom(cy.zoom() * 1.2)"><i data-lucide="plus" size="18"></i></button>
            <button class="control-btn" onclick="cy.zoom(cy.zoom() * 0.8)"><i data-lucide="minus" size="18"></i></button>
        </div>
    </main>

    <script>
        let cy;
        const apiKey = ""; 

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadContext();
            initCy();
        });

        function loadContext() {
            const plan = JSON.parse(localStorage.getItem('lumina_active_plan'));
            if (plan) {
                document.getElementById('chapter-name').innerText = plan.currentChapter || "New Concept";
                document.getElementById('subject-name').innerText = plan.subject || "General Study";
            }
        }

        function initCy() {
            cy = cytoscape({
                container: document.getElementById('cy'),
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': 'data(label)',
                            'background-color': 'data(color)',
                            'color': '#fff',
                            'font-size': '10px',
                            'text-valign': 'center',
                            'width': 40,
                            'height': 40,
                            'text-outline-width': 1,
                            'text-outline-color': '#000'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 1,
                            'line-color': 'rgba(255,255,255,0.2)',
                            'curve-style': 'haystack'
                        }
                    }
                ]
            });

            cy.on('tap', 'node', (e) => {
                const data = e.target.data();
                document.getElementById('concept-card').style.display = 'block';
                document.getElementById('node-label').innerText = data.label;
                document.getElementById('node-tag').innerText = data.subject;
                document.getElementById('node-desc').innerText = data.description;
            });
        }

        async function generateGraph() {
            const plan = JSON.parse(localStorage.getItem('lumina_active_plan'));
            if (!plan) return;

            document.getElementById('loader').style.display = 'flex';
            
            const prompt = `Topic: ${plan.currentChapter} (${plan.subject}). 
            Create a simple knowledge graph. Return ONLY JSON:
            {
              "nodes": [
                {"id": "n1", "label": "Main Topic", "subject": "Core", "description": "...", "color": "#00d4ff"},
                {"id": "n2", "label": "Connected Concept", "subject": "History", "description": "How it relates...", "color": "#7000ff"}
              ],
              "edges": [{"source": "n1", "target": "n2"}]
            }
            Include 6-8 interdisciplinary nodes. Keep descriptions short.`;

            try {
                const response = await callGemini(prompt);
                const data = JSON.parse(response);
                
                cy.elements().remove();
                cy.add({
                    nodes: data.nodes.map(n => ({ data: n })),
                    edges: data.edges.map(e => ({ data: e }))
                });

                cy.layout({ name: 'circle', padding: 100 }).run();
                document.getElementById('gen-btn').innerHTML = '<i data-lucide="refresh-cw" size="16"></i> Re-map';
                lucide.createIcons();
            } catch (e) {
                console.error(e);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        async function callGemini(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const res = await fetch(url, {
                method: 'POST',
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }
    </script>
</body>
</html>
