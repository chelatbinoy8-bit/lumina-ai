<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Knowledge Graphs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7000ff;
            --accent-blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #visual-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            object-fit: cover;
            opacity: 0.3;
            filter: blur(5px);
            transition: opacity 1s ease;
        }

        .ambient-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, transparent 0%, var(--bg-dark) 90%);
        }

        nav {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .logo { font-weight: 800; letter-spacing: 2px; font-size: 1.2rem; background: linear-gradient(to right, #fff, var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        main { flex: 1; display: flex; position: relative; }

        #cy { flex: 1; width: 100%; height: 100%; background: transparent; }

        .sidebar {
            position: absolute;
            left: 20px; top: 20px;
            width: 320px;
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            backdrop-filter: blur(30px);
            padding: 25px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .concept-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 16px;
            display: none;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-generate {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            color: white; border: none; padding: 14px; border-radius: 12px;
            font-weight: 700; cursor: pointer; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }

        .btn-generate:disabled { opacity: 0.6; cursor: wait; }

        #status-box {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            display: none;
            align-items: center; gap: 15px;
            z-index: 1000;
        }

        .loader-dot {
            width: 8px; height: 8px; background: var(--accent-blue);
            border-radius: 50%; animation: pulse 1s infinite alternate;
        }

        @keyframes pulse { from { opacity: 0.3; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }
    </style>
</head>
<body>

    <img id="visual-bg" src="" alt="">
    <div class="ambient-overlay"></div>

    <div id="status-box">
        <div class="loader-dot"></div>
        <span id="status-text" style="font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px;">AI WORKING...</span>
    </div>

    <nav>
        <div class="logo-area" onclick="location.href='dashboard.html'">
            <i data-lucide="arrow-left" size="20"></i>
            <span class="logo">LUMINA</span>
        </div>
        <div style="text-align: right;">
            <div id="chapter-name" style="font-weight: 700; font-size: 1rem;">Map View</div>
            <div id="subject-name" style="color: var(--accent-blue); font-size: 0.75rem; text-transform: uppercase;">Subject</div>
        </div>
    </nav>

    <main>
        <div class="sidebar">
            <h3 style="font-size: 1.1rem; font-weight: 800;">Knowledge Discovery</h3>
            <p style="font-size: 0.8rem; color: var(--text-dim);">Lumina will first generate a visual context, then map out text-based conceptual connections.</p>
            
            <button class="btn-generate" id="gen-btn" onclick="startGeneration()">
                <i data-lucide="sparkles" size="18"></i>
                Visualize & Map
            </button>

            <div id="concept-card" class="concept-card">
                <h4 id="node-label" style="color: var(--accent-blue); font-size: 1rem; margin-bottom: 4px;">Concept</h4>
                <div id="node-tag" style="font-size: 0.65rem; font-weight: 700; background: var(--accent-purple); color: white; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 10px;">FIELD</div>
                <p id="node-desc" style="font-size: 0.85rem; line-height: 1.5; color: var(--text-dim);"></p>
            </div>
        </div>

        <div id="cy"></div>
    </main>

    <script>
        let cy;
        const apiKey = ""; // Runtime key

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadContext();
            initCy();
        });

        function loadContext() {
            const plan = JSON.parse(localStorage.getItem('lumina_active_plan'));
            if (plan) {
                document.getElementById('chapter-name').innerText = plan.currentChapter || "Conceptual Map";
                document.getElementById('subject-name').innerText = plan.subject || "Study";
            }
        }

        function initCy() {
            cy = cytoscape({
                container: document.getElementById('cy'),
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': 'data(label)',
                            'background-color': 'data(color)',
                            'color': '#fff',
                            'font-family': 'Inter',
                            'font-size': '11px',
                            'font-weight': '600',
                            'text-valign': 'center',
                            'width': 45, 'height': 45,
                            'text-outline-width': 2,
                            'text-outline-color': '#000'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 2,
                            'line-color': 'rgba(255,255,255,0.2)',
                            'curve-style': 'bezier',
                            'target-arrow-shape': 'triangle',
                            'target-arrow-color': 'rgba(255,255,255,0.2)'
                        }
                    }
                ]
            });

            cy.on('tap', 'node', (e) => {
                const data = e.target.data();
                const card = document.getElementById('concept-card');
                card.style.display = 'block';
                document.getElementById('node-label').innerText = data.label;
                document.getElementById('node-tag').innerText = data.subject || "Concept";
                document.getElementById('node-desc').innerText = data.description;
            });
        }

        async function startGeneration() {
            const plan = JSON.parse(localStorage.getItem('lumina_active_plan'));
            if (!plan) return;

            const btn = document.getElementById('gen-btn');
            const statusBox = document.getElementById('status-box');
            const statusText = document.getElementById('status-text');

            btn.disabled = true;
            statusBox.style.display = 'flex';

            try {
                // 1. Generate Image First
                statusText.innerText = "GENERATING VISUAL CONTEXT...";
                const imgUrl = await generateContextImage(plan.currentChapter, plan.subject);
                if (imgUrl) {
                    const bg = document.getElementById('visual-bg');
                    bg.src = imgUrl;
                    bg.style.opacity = "0.3";
                }

                // 2. Generate Graph Data
                statusText.innerText = "MAPPING TEXT CONNECTIONS...";
                const graphData = await generateGraphData(plan.currentChapter, plan.subject);
                
                cy.elements().remove();
                cy.add({
                    nodes: graphData.nodes.map(n => ({ data: n })),
                    edges: graphData.edges.map(e => ({ data: e }))
                });

                cy.layout({ name: 'cose', animate: true, padding: 50 }).run();

            } catch (err) {
                console.error(err);
                statusText.innerText = "RETRIEVING SIMPLIFIED MAP...";
                // Minimal Fallback
                const fallback = {
                    nodes: [{ id: "c1", label: plan.currentChapter, color: "#00d4ff", description: "Main topic for analysis." }],
                    edges: []
                };
                cy.add({ nodes: fallback.nodes.map(n => ({ data: n })) });
            } finally {
                statusBox.style.display = 'none';
                btn.disabled = false;
            }
        }

        async function generateContextImage(topic, subject) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            const prompt = `A cinematic, abstract, high-tech representation of ${topic} in the field of ${subject}. Dark background, neon light traces, 8k resolution, educational concept art.`;
            
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({ instances: { prompt: prompt }, parameters: { sampleCount: 1 } })
                });
                const data = await res.json();
                return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
            } catch (e) { return null; }
        }

        async function generateGraphData(topic, subject) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const prompt = `Create a knowledge graph for the topic: ${topic} (${subject}). 
            Identify 6 related concepts. 
            Format as EXACT JSON ONLY:
            {
                "nodes": [{"id": "a", "label": "Name", "subject": "Field", "description": "1 sentence", "color": "#7000ff"}],
                "edges": [{"source": "a", "target": "b"}]
            }`;

            const res = await fetch(url, {
                method: 'POST',
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            const result = await res.json();
            const text = result.candidates[0].content.parts[0].text;
            
            // Clean AI text to find JSON
            const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
            return JSON.parse(jsonStr);
        }
    </script>
</body>
</html>
