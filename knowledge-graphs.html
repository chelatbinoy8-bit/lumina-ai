<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Concept Mapper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7000ff;
            --accent-blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --card-bg: rgba(15, 15, 15, 0.6);
            --error: #ff4b4b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .ambient-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, rgba(112, 0, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(0, 212, 255, 0.05) 0%, transparent 50%);
        }

        nav {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .logo { font-weight: 800; letter-spacing: 2px; font-size: 1.2rem; background: linear-gradient(to right, #fff, var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        main { 
            max-width: 900px; 
            margin: 40px auto; 
            padding: 0 20px;
            width: 100%;
        }

        .header-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-section h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .header-section p {
            color: var(--text-dim);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .control-panel {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 40px;
            text-align: center;
        }

        .btn-generate {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            color: white; border: none; padding: 16px 32px; border-radius: 14px;
            font-weight: 700; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
            font-size: 1rem;
        }

        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(112, 0, 255, 0.2); }
        .btn-generate:disabled { opacity: 0.5; cursor: wait; }

        .connection-grid {
            display: grid;
            gap: 20px;
        }

        .connection-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            transition: 0.3s;
            animation: slideUp 0.5s ease forwards;
            opacity: 0;
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .concept-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-blue);
        }

        .subject-tag {
            font-size: 0.7rem;
            font-weight: 700;
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .big-picture-content {
            line-height: 1.6;
            color: #ddd;
            margin-bottom: 20px;
        }

        .link-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-purple);
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        #loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loader-spin {
            width: 40px; height: 40px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
        }

        .error-message {
            color: var(--error);
            background: rgba(255, 75, 75, 0.1);
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid var(--error);
        }
    </style>
</head>
<body>

    <div class="ambient-overlay"></div>

    <nav>
        <div class="logo-area" onclick="location.href='student-home.html'">
            <i data-lucide="arrow-left" size="20"></i>
            <span class="logo">LUMINA</span>
        </div>
        <div style="text-align: right;">
            <div id="current-topic" style="font-weight: 700; font-size: 1rem;">Big Picture View</div>
            <div id="current-subject" style="color: var(--accent-blue); font-size: 0.75rem; text-transform: uppercase;">Subject Insights</div>
        </div>
    </nav>

    <main>
        <div class="header-section">
            <h1>Concept Mapper</h1>
            <p>Moving beyond definitions. We use AI to textualize connections between your current study topic and the wider world of knowledge.</p>
        </div>

        <div class="control-panel">
            <button class="btn-generate" id="gen-btn" onclick="startMapping()">
                <i data-lucide="network" size="20"></i>
                Map Connections
            </button>
        </div>

        <div id="loading">
            <div class="loader-spin"></div>
            <p style="color: var(--accent-blue); font-weight: 600;">Lumina AI is processing the big picture...</p>
        </div>

        <div id="connection-container" class="connection-grid">
            <div class="empty-state">
                <i data-lucide="layers" size="40" style="margin-bottom: 15px; opacity: 0.5;"></i>
                <p>Click 'Map Connections' to analyze interdisciplinary links.</p>
            </div>
        </div>
    </main>

    <script>
        const apiKey = ""; // Provided at runtime
        const modelName = "gemini-2.5-flash-preview-09-2025";

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const plan = JSON.parse(localStorage.getItem('lumina_active_plan'));
            if (plan) {
                document.getElementById('current-topic').innerText = plan.currentChapter || "Active Topic";
                document.getElementById('current-subject').innerText = plan.subject || "Study Area";
            }
        });

        async function fetchWithRetry(url, options, retries = 5, backoff = 1000) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (err) {
                if (retries > 0) {
                    await new Promise(resolve => setTimeout(resolve, backoff));
                    return fetchWithRetry(url, options, retries - 1, backoff * 2);
                }
                throw err;
            }
        }

        async function startMapping() {
            const plan = JSON.parse(localStorage.getItem('lumina_active_plan'));
            const session = JSON.parse(localStorage.getItem('lumina_session'));
            const userKey = session?.profile?.apiKey || apiKey;

            if (!plan) {
                showError("No active study plan found. Please create one first.");
                return;
            }

            if (!userKey) {
                showError("Gemini API Key missing. Please update your profile in settings.");
                return;
            }

            const container = document.getElementById('connection-container');
            const loading = document.getElementById('loading');
            const btn = document.getElementById('gen-btn');

            btn.disabled = true;
            container.innerHTML = '';
            loading.style.display = 'block';

            try {
                const topic = plan.currentChapter;
                const subject = plan.subject;

                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${userKey}`;
                
                const systemPrompt = `You are an interdisciplinary academic expert. 
                Goal: Textualize connections between a specific study topic and other subjects to provide a 'Big Picture' view.
                Provide 4 distinct, high-quality connections.
                Avoid generic fluff. Be specific about HOW they connect.`;

                const userPrompt = `The student is currently studying "${topic}" in the subject "${subject}". 
                Explain 4 connections this topic has with OTHER fields (e.g., how it relates to Economics, Biology, History, Art, or Ethics).
                Return ONLY a JSON array of objects with these keys: "title", "subject", "description", "link".`;

                const payload = {
                    contents: [{ parts: [{ text: userPrompt }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "ARRAY",
                            items: {
                                type: "OBJECT",
                                properties: {
                                    title: { type: "STRING" },
                                    subject: { type: "STRING" },
                                    description: { type: "STRING" },
                                    link: { type: "STRING" }
                                },
                                required: ["title", "subject", "description", "link"]
                            }
                        }
                    }
                };

                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = JSON.parse(result.candidates?.[0]?.content?.parts?.[0]?.text || "[]");
                
                if (data.length === 0) {
                    showError("No connections found for this topic. Try another chapter.");
                } else {
                    renderConnections(data);
                }

            } catch (err) {
                console.error(err);
                showError("AI Analysis failed after multiple attempts. Please check your internet connection or API key.");
            } finally {
                loading.style.display = 'none';
                btn.disabled = false;
            }
        }

        function renderConnections(connections) {
            const container = document.getElementById('connection-container');
            container.innerHTML = '';

            connections.forEach((conn, index) => {
                const card = document.createElement('div');
                card.className = 'connection-card';
                card.style.animationDelay = `${index * 0.1}s`;
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="concept-title">${conn.title}</div>
                        <div class="subject-tag">${conn.subject}</div>
                    </div>
                    <div class="big-picture-content">
                        ${conn.description}
                    </div>
                    <div class="link-indicator">
                        <i data-lucide="link" size="14"></i>
                        <span>${conn.link}</span>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        function showError(msg) {
            const container = document.getElementById('connection-container');
            container.innerHTML = `<div class="error-message">${msg}</div>`;
        }
    </script>
</body>
</html>
