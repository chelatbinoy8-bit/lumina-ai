<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Socratic Focus</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #050508;
            --lumina-purple: #8b5cf6;
            --lumina-blue: #0ea5e9;
            --text-main: #f8fafc;
            --text-dim: #64748b;
            --glass: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.05);
            --sidebar-w: 320px;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(14, 165, 233, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Focused on Single Topic */
        .sidebar {
            width: var(--sidebar-w);
            border-right: 1px solid var(--glass-border);
            background: rgba(2, 2, 4, 0.4);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            padding: 40px 25px;
            z-index: 20;
        }

        .topic-header { margin-bottom: 30px; }
        .topic-header span { 
            font-size: 0.65rem; 
            color: var(--lumina-purple); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 800; 
        }
        .topic-header h2 { font-size: 1.4rem; margin: 8px 0 0 0; color: white; line-height: 1.2; }

        /* Progress Visualizer */
        .mastery-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .progress-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 15px; }
        .progress-label .pct { font-size: 1.5rem; font-weight: 800; color: white; }
        .progress-label .txt { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }

        .progress-bar-bg { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(to right, var(--lumina-purple), var(--lumina-blue)); width: 0%; transition: 1s cubic-bezier(0.16, 1, 0.3, 1); }

        /* Aspect List */
        .aspects-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 15px; font-weight: 700; }
        .aspect-list { flex: 1; overflow-y: auto; }
        .aspect-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            font-size: 0.85rem;
            color: var(--text-dim);
            transition: 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .aspect-item.completed { color: #10b981; }
        .aspect-item.active { color: white; font-weight: 600; }
        .aspect-item i { flex-shrink: 0; }

        /* Main Content */
        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            padding: 30px 50px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            z-index: 10;
        }

        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 0 80px;
            display: flex;
            flex-direction: column;
            scrollbar-width: none;
        }
        #chat-flow::-webkit-scrollbar { display: none; }

        .msg-wrapper {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            animation: slideFade 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: 800; }
        .ai .msg-label { color: var(--lumina-purple); }
        .user .msg-label { color: var(--lumina-blue); align-self: flex-end; }

        .msg-content { font-size: 1.05rem; line-height: 1.7; max-width: 80%; }
        .ai .msg-content { border-left: 2px solid var(--lumina-purple); padding-left: 25px; color: #e2e8f0; }
        .user .msg-content { align-self: flex-end; text-align: right; border-right: 2px solid var(--lumina-blue); padding-right: 25px; color: #94a3b8; }

        /* Input Area */
        .input-outer { padding: 40px 80px; }
        .input-container {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(30px);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 12px 15px 12px 30px;
            transition: 0.4s;
        }
        .input-container:focus-within { border-color: var(--lumina-purple); background: rgba(15, 23, 42, 0.8); }
        input { flex: 1; background: none; border: none; color: white; font-size: 1rem; outline: none; font-family: inherit; }

        .btn-send {
            background: var(--lumina-purple);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .btn-send:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); }

        .btn-exit {
            background: none;
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-exit:hover { border-color: #ef4444; color: #ef4444; }

        .typing { 
            font-size: 0.7rem; 
            color: var(--lumina-purple); 
            padding: 0 80px;
            margin-bottom: 10px;
            display: none;
            font-weight: 700;
            text-transform: uppercase;
        }

        .completion-ui {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), transparent);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 40px;
            margin: 40px 0;
            border-radius: 30px;
            text-align: center;
        }
        .btn-done {
            background: #10b981;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 25px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="topic-header">
            <span>Active Module</span>
            <h2 id="active-topic-title">Loading...</h2>
        </div>

        <div class="mastery-card">
            <div class="progress-label">
                <span class="pct" id="progress-pct">0%</span>
                <span class="txt">Mastery Level</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="aspects-title">Cognitive Milestones</div>
        <div class="aspect-list" id="aspect-list">
            <!-- Dynamic Aspects -->
        </div>
    </aside>

    <main class="main-stage">
        <header class="chat-header">
            <button class="btn-exit" onclick="handleExit()">Exit Session</button>
        </header>

        <div id="chat-flow"></div>

        <div class="typing" id="typing-indicator">Analyzing Response...</div>

        <footer class="input-outer">
            <form class="input-container" onsubmit="sendMessage(event)">
                <input type="text" id="userInput" placeholder="Synthesize your thoughts..." autocomplete="off">
                <button type="submit" class="btn-send">
                    <i data-lucide="zap" size="20"></i>
                </button>
            </form>
        </footer>
    </main>

    <script>
        const defaultPlan = {
            subject: "Neural Science",
            chapters: [
                { title: "Synaptic Plasticity", details: "The ability of synapses to strengthen or weaken over time.", completed: false }
            ]
        };

        let plan = JSON.parse(localStorage.getItem('lumina_active_plan')) || defaultPlan;
        const groqKey = localStorage.getItem('lumina_groq_key') || "";
        
        const activeChapter = plan.chapters.find(c => !c.completed) || plan.chapters[0];
        
        const milestones = [
            "Contextual Hook",
            "Functional Logic",
            "Structural Components",
            "Edge Case Analysis",
            "Formal Definition"
        ];

        let currentMilestoneIndex = 0;
        let chatHistory = [];

        function updateProgressUI() {
            const pct = Math.round((currentMilestoneIndex / milestones.length) * 100);
            document.getElementById('progress-pct').innerText = `${pct}%`;
            document.getElementById('progress-fill').style.width = `${pct}%`;

            const list = document.getElementById('aspect-list');
            list.innerHTML = '';
            milestones.forEach((m, idx) => {
                const isCompleted = idx < currentMilestoneIndex;
                const isActive = idx === currentMilestoneIndex;
                
                const div = document.createElement('div');
                div.className = `aspect-item ${isCompleted ? 'completed' : ''} ${isActive ? 'active' : ''}`;
                div.innerHTML = `
                    <i data-lucide="${isCompleted ? 'check-circle' : (isActive ? 'target' : 'circle')}" size="14"></i>
                    <span>${m}</span>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        async function initTutor() {
            if (!groqKey) {
                appendMessage('ai', "Neural Key missing. Please provide your Groq API key in the settings.");
                return;
            }

            document.getElementById('active-topic-title').innerText = activeChapter.title;
            updateProgressUI();

            const systemPrompt = `
                You are Lumina, a Socratic Tutor. Your goal is to guide the student to mastery of: "${activeChapter.title}" (${activeChapter.details}).
                
                STRICT COGNITIVE MILESTONES:
                1. Contextual Hook: Why does this matter? (Start here)
                2. Functional Logic: How does the mechanism work?
                3. Structural Components: What are the specific parts involved?
                4. Edge Case Analysis: What happens if variables change?
                5. Formal Definition: Can the student define it in their own words perfectly?

                SOCRATIC RULES:
                - NEVER give the answer or define the concept.
                - Challenge the student's logic. If they are wrong or vague, DO NOT advance. Correct their misconception with a new question.
                - Only move to the next milestone when the student proves deep understanding of the current one.
                - Be brief, sharp, and demanding.

                PROTOCOL FOR ADVANCEMENT:
                - If the student successfully masters the CURRENT milestone and you are ready to move to the NEXT one, you MUST include the tag [ADVANCE] in your response.
                - If the student provides a perfect final definition and the session is over, include [SESSION_COMPLETE].
                - IMPORTANT: Do not include [ADVANCE] if the student's logic is flawed or incomplete for the current stage.

                CURRENT MILESTONE: ${milestones[currentMilestoneIndex]}.
            `;

            chatHistory.push({ role: "system", content: systemPrompt });
            await callGroq();
        }

        async function callGroq() {
            const typing = document.getElementById('typing-indicator');
            typing.style.display = 'block';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${groqKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: chatHistory,
                        temperature: 0.2, // Lowered further for stricter logic evaluation
                        max_tokens: 500
                    })
                });

                const data = await response.json();
                let aiMsg = data.choices[0].message.content;
                
                // Logic for milestone progression based on AI's evaluation
                if (aiMsg.includes("[ADVANCE]")) {
                    aiMsg = aiMsg.replace("[ADVANCE]", "").trim();
                    if (currentMilestoneIndex < milestones.length - 1) {
                        currentMilestoneIndex++;
                        updateProgressUI();
                        // Update system prompt to reflect the new milestone for subsequent turns
                        chatHistory[0].content = chatHistory[0].content.replace(/CURRENT MILESTONE: .*/, `CURRENT MILESTONE: ${milestones[currentMilestoneIndex]}`);
                    }
                }

                if (aiMsg.includes("[SESSION_COMPLETE]")) {
                    aiMsg = aiMsg.replace("[SESSION_COMPLETE]", "").trim();
                    currentMilestoneIndex = milestones.length;
                    updateProgressUI();
                    showCompletionUI();
                }

                chatHistory.push({ role: "assistant", content: aiMsg });
                appendMessage('ai', aiMsg);
            } catch (e) {
                appendMessage('ai', "Signal interference. Check your connection or API key.");
            } finally {
                typing.style.display = 'none';
            }
        }

        function appendMessage(role, text) {
            const flow = document.getElementById('chat-flow');
            const wrap = document.createElement('div');
            wrap.className = `msg-wrapper ${role}`;
            
            const label = document.createElement('div');
            label.className = 'msg-label';
            label.innerText = role === 'ai' ? 'Lumina' : 'You';
            
            const content = document.createElement('div');
            content.className = 'msg-content';
            content.innerText = text;
            
            wrap.appendChild(label);
            wrap.appendChild(content);
            flow.appendChild(wrap);
            flow.scrollTo({ top: flow.scrollHeight, behavior: 'smooth' });
        }

        async function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if (!val) return;

            appendMessage('user', val);
            input.value = '';
            chatHistory.push({ role: "user", content: val });
            await callGroq();
        }

        function showCompletionUI() {
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div');
            div.className = 'completion-ui';
            div.innerHTML = `
                <h2 style="margin:0; color:#10b981; font-weight:800; letter-spacing:-1px;">100% MASTERY</h2>
                <p style="font-size:1.1rem; margin:15px 0; color:var(--text-dim);">The architecture of ${activeChapter.title} is now a part of your cognitive framework.</p>
                <button class="btn-done" onclick="markAsDone()">Archive Knowledge</button>
            `;
            flow.appendChild(div);
            flow.scrollTo({ top: flow.scrollHeight, behavior: 'smooth' });
        }

        function markAsDone() {
            plan.chapters = plan.chapters.map(c => {
                if (c.title === activeChapter.title) return { ...c, completed: true };
                return c;
            });
            localStorage.setItem('lumina_active_plan', JSON.stringify(plan));
            window.location.href = 'dashboard.html';
        }

        function handleExit() {
            window.location.href = 'dashboard.html';
        }

        window.onload = initTutor;
    </script>
</body>
</html>
