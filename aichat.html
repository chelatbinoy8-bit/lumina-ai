<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Socratic Tutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7000ff;
            --accent-blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --success: #00ff88;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            border-left: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.01);
        }

        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .lesson-info h2 { font-size: 1.1rem; margin: 0; font-weight: 800; }
        .lesson-info p { font-size: 0.75rem; color: var(--accent-blue); margin: 4px 0 0; text-transform: uppercase; letter-spacing: 1px; }

        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .msg { max-width: 85%; padding: 16px 20px; border-radius: 20px; line-height: 1.6; font-size: 0.95rem; position: relative; white-space: pre-wrap; }
        .msg.ai { 
            align-self: flex-start; 
            background: var(--glass); 
            border: 1px solid var(--glass-border); 
            border-bottom-left-radius: 4px;
        }
        .msg.user { 
            align-self: flex-end; 
            background: var(--accent-purple); 
            color: white; 
            border-bottom-right-radius: 4px;
        }

        .input-area {
            padding: 25px 30px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
            background: var(--bg-dark);
        }

        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 15px 20px;
            border-radius: 14px;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(0, 212, 255, 0.1); }

        .btn-send {
            background: var(--accent-blue);
            color: #000;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .btn-send:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }

        .btn-back {
            background: none;
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .btn-back:hover { background: var(--glass); color: white; }

        .typing { font-size: 0.8rem; color: var(--accent-blue); margin-bottom: 10px; display: none; padding: 0 30px; }

        .completion-card {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--success);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-top: 10px;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn-complete {
            background: var(--success);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="lesson-info">
                <p id="subject-label">Subject</p>
                <h2 id="lesson-title">Loading Lesson...</h2>
            </div>
            <button class="btn-back" onclick="handleExit()">
                <i data-lucide="arrow-left" size="16"></i> Exit Session
            </button>
        </div>

        <div id="chat-flow">
            <!-- Messages appear here -->
        </div>

        <div class="typing" id="typing-indicator">Lumina is formulating a thought...</div>

        <form class="input-area" onsubmit="sendMessage(event)">
            <input type="text" id="userInput" placeholder="Share your thoughts..." autocomplete="off">
            <button type="submit" class="btn-send">
                <i data-lucide="send" size="20"></i>
            </button>
        </form>
    </div>

    <script>
        let plan = JSON.parse(localStorage.getItem('lumina_active_plan'));
        const groqKey = localStorage.getItem('lumina_groq_key');
        
        const activeChapterTitle = plan.currentChapter || plan.chapters.find(c => !c.completed)?.title || plan.chapters[0].title;
        const activeChapterDetails = plan.currentDetails || plan.chapters.find(c => !c.completed)?.details || plan.chapters[0].details;
        const currentSubject = (plan.subject || "").toLowerCase();

        let chatHistory = [];

        document.getElementById('subject-label').innerText = plan.subject;
        document.getElementById('lesson-title').innerText = activeChapterTitle;

        async function initTutor() {
            if (!groqKey) {
                appendMessage('ai', "Error: No API Key found. Please go back to the dashboard and ensure your setup is complete.");
                return;
            }

            let subjectSpecialization = "";
            
            if (["biology", "physics", "chemistry", "science"].some(s => currentSubject.includes(s))) {
                subjectSpecialization = `
                    SPECIFIC BEHAVIOR FOR SCIENCE:
                    1. For this subject, start with 1-2 engaging story-based examples or metaphors.
                    2. Continue and evolve these stories/examples throughout the conversation. 
                    3. If the student doesn't understand, provide more varied examples or dive deeper into the current analogy.
                    4. IMPORTANT: Only provide formal definitions, scientific terms, or formulas once you are CERTAIN the student has "learned it perfectly" through the stories and examples. 
                    5. Once the conceptual logic is mastered, summarize with the correct scientific definitions to solidify the exam-readiness.
                `;
            } else if (currentSubject.includes("math")) {
                subjectSpecialization = `
                    SPECIFIC BEHAVIOR FOR MATH:
                    1. Use direct questioning and logical discussions.
                    2. Present small problems or step-by-step logical proofs.
                    3. Focus on derivation rather than rote memorization of formulas.
                `;
            }

            const systemPrompt = `
                You are Lumina, a brilliant Socratic Tutor.
                CURRENT LESSON: "${activeChapterTitle}"
                LESSON CONTEXT: "${activeChapterDetails}"
                SUBJECT: "${currentSubject}"
                
                YOUR PEDAGOGICAL PROTOCOL:
                1. NEVER give direct answers or definitions early on.
                2. If the student asks "What is X?", bridge it to a familiar concept or story.
                3. If the student makes a mistake, ask: "That's an interesting perspective. If that were true, how would [related concept] work?"
                4. Focus on ONE sub-concept at a time.
                ${subjectSpecialization}
                5. When the student has reached complete conceptual mastery, conclude your final teaching message with: "[SESSION_COMPLETE]".
                
                Start by introducing the topic through the lens of your subject specialization (story/example for science, logic/question for math).
            `;

            chatHistory.push({ role: "system", content: systemPrompt });
            await callGroq();
        }

        async function callGroq() {
            const typing = document.getElementById('typing-indicator');
            typing.style.display = 'block';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${groqKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: chatHistory,
                        temperature: 0.6,
                        max_tokens: 1200
                    })
                });

                const data = await response.json();
                let aiMsg = data.choices[0].message.content;
                
                if (aiMsg.includes("[SESSION_COMPLETE]")) {
                    aiMsg = aiMsg.replace("[SESSION_COMPLETE]", "").trim();
                    showCompletionUI();
                }

                chatHistory.push({ role: "assistant", content: aiMsg });
                appendMessage('ai', aiMsg);
            } catch (e) {
                appendMessage('ai', "I've momentarily lost my train of thought (Connection Error). Please try sending your message again.");
            } finally {
                typing.style.display = 'none';
            }
        }

        function appendMessage(role, text) {
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerText = text;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        async function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            appendMessage('user', text);
            input.value = '';
            chatHistory.push({ role: "user", content: text });
            
            await callGroq();
        }

        function showCompletionUI() {
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div');
            div.className = 'completion-card';
            div.innerHTML = `
                <h3 style="margin:0; color:var(--success)">Aha! Mastery Achieved!</h3>
                <p style="font-size:0.9rem; margin:10px 0;">You've demonstrated a perfect understanding of this chapter.</p>
                <button class="btn-complete" onclick="markAsDone()">Mark Topic as Complete</button>
            `;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        function markAsDone() {
            plan.chapters = plan.chapters.map(c => {
                if (c.title === activeChapterTitle) {
                    return { ...c, completed: true };
                }
                return c;
            });
            
            localStorage.setItem('lumina_active_plan', JSON.stringify(plan));
            window.location.href = 'dashboard.html';
        }

        function handleExit() {
            delete plan.currentChapter;
            delete plan.currentDetails;
            localStorage.setItem('lumina_active_plan', JSON.stringify(plan));
            window.location.href = 'dashboard.html';
        }

        window.onload = () => {
            lucide.createIcons();
            initTutor();
        };
    </script>
</body>
</html>
