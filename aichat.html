<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Socratic Tutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #050508;
            --lumina-purple: #8b5cf6;
            --lumina-blue: #0ea5e9;
            --text-main: #f8fafc;
            --text-dim: #64748b;
            --glass: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.05);
            --sidebar-w: 280px;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(14, 165, 233, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Sidebar */
        .sidebar {
            width: var(--sidebar-w);
            border-right: 1px solid var(--glass-border);
            background: rgba(2, 2, 4, 0.4);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            z-index: 20;
        }

        .sidebar-header { margin-bottom: 40px; }
        .sidebar-header h1 { font-size: 1.2rem; margin: 0; letter-spacing: 2px; font-weight: 800; color: white; }
        
        .chapter-list { flex: 1; overflow-y: auto; }
        .chapter-item {
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-dim);
            cursor: default;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .chapter-item.active {
            background: rgba(139, 92, 246, 0.1);
            color: white;
            border-color: rgba(139, 92, 246, 0.2);
        }
        .chapter-item.completed { color: #10b981; }
        .chapter-item i { flex-shrink: 0; }

        /* Main Content */
        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* Removed background gradient to prevent "black box" artifacts */
            z-index: 10;
        }

        .lesson-info p { 
            font-size: 0.65rem; 
            color: var(--lumina-blue); 
            margin: 0 0 5px 0; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            font-weight: 800;
        }

        .lesson-info h2 { 
            font-size: 1.5rem; 
            margin: 0; 
            font-weight: 700; 
            color: white;
        }

        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 0 50px;
            display: flex;
            flex-direction: column;
            scrollbar-width: none;
        }
        #chat-flow::-webkit-scrollbar { display: none; }

        .msg-wrapper {
            margin-bottom: 45px;
            display: flex;
            flex-direction: column;
            animation: slideFade 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideFade {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .msg-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            font-weight: 800;
            opacity: 0.5;
        }

        .ai .msg-label { color: var(--lumina-purple); opacity: 1; }
        .user .msg-label { color: var(--lumina-blue); align-self: flex-end; opacity: 1; }

        .msg-content {
            font-size: 1.1rem;
            line-height: 1.8;
            max-width: 85%;
            font-weight: 400;
        }

        .ai .msg-content {
            border-left: 1px solid rgba(139, 92, 246, 0.3);
            padding-left: 25px;
            color: #e2e8f0;
        }

        .user .msg-content {
            align-self: flex-end;
            text-align: right;
            border-right: 1px solid rgba(14, 165, 233, 0.3);
            padding-right: 25px;
            color: #94a3b8;
        }

        /* Input Area */
        .input-outer {
            padding: 40px 50px;
        }

        .input-container {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(30px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 10px 15px 10px 25px;
            transition: 0.4s;
        }

        .input-container:focus-within {
            border-color: rgba(139, 92, 246, 0.3);
            background: rgba(15, 23, 42, 0.8);
        }

        input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }

        .btn-send {
            background: var(--lumina-purple);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .btn-send:hover { transform: scale(1.05); filter: brightness(1.2); }

        .btn-exit {
            background: none;
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-exit:hover { border-color: #ef4444; color: #ef4444; }

        .typing { 
            font-size: 0.7rem; 
            color: var(--lumina-purple); 
            padding: 0 50px;
            margin-bottom: 10px;
            display: none;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .completion-ui {
            background: linear-gradient(to right, rgba(16, 185, 129, 0.05), transparent);
            border-left: 2px solid #10b981;
            padding: 30px;
            margin: 40px 0;
            border-radius: 0 20px 20px 0;
        }

        .btn-done {
            background: #10b981;
            color: #064e3b;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>LUMINA</h1>
        </div>
        <div class="chapter-list" id="sidebar-chapters">
            <!-- Chapters generated here -->
        </div>
    </aside>

    <main class="main-stage">
        <header class="chat-header">
            <div class="lesson-info">
                <p id="subject-label">Subject</p>
                <h2 id="lesson-title">Neural Link Active</h2>
            </div>
            <button class="btn-exit" onclick="handleExit()">Exit Session</button>
        </header>

        <div id="chat-flow">
            <!-- Messages -->
        </div>

        <div class="typing" id="typing-indicator">Synchronizing Thoughts...</div>

        <footer class="input-outer">
            <form class="input-container" onsubmit="sendMessage(event)">
                <input type="text" id="userInput" placeholder="Explore this thought further..." autocomplete="off">
                <button type="submit" class="btn-send">
                    <i data-lucide="arrow-right" size="18"></i>
                </button>
            </form>
        </footer>
    </main>

    <script>
        let plan = JSON.parse(localStorage.getItem('lumina_active_plan'));
        const groqKey = localStorage.getItem('lumina_groq_key');
        
        const activeChapterTitle = plan.currentChapter || plan.chapters.find(c => !c.completed)?.title || plan.chapters[0].title;
        const activeChapterDetails = plan.currentDetails || plan.chapters.find(c => !c.completed)?.details || plan.chapters[0].details;
        const currentSubject = (plan.subject || "").toLowerCase();

        let chatHistory = [];
        let messageCount = 0; // Tracking for depth

        function renderSidebar() {
            const container = document.getElementById('sidebar-chapters');
            container.innerHTML = '';
            plan.chapters.forEach(chap => {
                const div = document.createElement('div');
                div.className = `chapter-item ${chap.title === activeChapterTitle ? 'active' : ''} ${chap.completed ? 'completed' : ''}`;
                div.innerHTML = `
                    <i data-lucide="${chap.completed ? 'check-circle-2' : (chap.title === activeChapterTitle ? 'play' : 'circle')}" size="14"></i>
                    <span>${chap.title}</span>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        async function initTutor() {
            if (!groqKey) {
                appendMessage('ai', "Authentication required. Please return to the nexus.");
                return;
            }

            document.getElementById('subject-label').innerText = plan.subject;
            document.getElementById('lesson-title').innerText = activeChapterTitle;
            renderSidebar();

            const systemPrompt = `
                You are Lumina, an ethereal Socratic Tutor.
                TOPIC: "${activeChapterTitle}"
                CONTEXT: "${activeChapterDetails}"
                
                CORE DIRECTIVES:
                1. DO NOT provide the [SESSION_COMPLETE] tag until at least 4-5 turns of deep dialogue have occurred.
                2. Even if the student says "I understand", challenge them with a "What if?" or "How does this apply to...?" to ensure mastery.
                3. Use poetic yet precise language. 
                4. Bridge abstract concepts to tangible metaphors.
                
                CONDITION FOR COMPLETION:
                Only when the student can explain the core logic back to you in their own words, output "[SESSION_COMPLETE]" at the end of your response.
            `;

            chatHistory.push({ role: "system", content: systemPrompt });
            await callGroq();
        }

        async function callGroq() {
            const typing = document.getElementById('typing-indicator');
            typing.style.display = 'block';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${groqKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: chatHistory,
                        temperature: 0.65,
                        max_tokens: 1500
                    })
                });

                const data = await response.json();
                let aiMsg = data.choices[0].message.content;
                
                if (aiMsg.includes("[SESSION_COMPLETE]") && messageCount > 3) {
                    aiMsg = aiMsg.replace("[SESSION_COMPLETE]", "").trim();
                    showCompletionUI();
                }

                chatHistory.push({ role: "assistant", content: aiMsg });
                appendMessage('ai', aiMsg);
            } catch (e) {
                appendMessage('ai', "A rift in the connection occurred. Let us re-center.");
            } finally {
                typing.style.display = 'none';
            }
        }

        function appendMessage(role, text) {
            const flow = document.getElementById('chat-flow');
            const wrap = document.createElement('div');
            wrap.className = `msg-wrapper ${role}`;
            
            const label = document.createElement('div');
            label.className = 'msg-label';
            label.innerText = role === 'ai' ? 'Lumina' : 'You';
            
            const content = document.createElement('div');
            content.className = 'msg-content';
            content.innerText = text;
            
            wrap.appendChild(label);
            wrap.appendChild(content);
            flow.appendChild(wrap);
            flow.scrollTo({ top: flow.scrollHeight, behavior: 'smooth' });
        }

        async function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if (!val) return;

            messageCount++;
            appendMessage('user', val);
            input.value = '';
            chatHistory.push({ role: "user", content: val });
            await callGroq();
        }

        function showCompletionUI() {
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div');
            div.className = 'completion-ui';
            div.innerHTML = `
                <h3 style="margin:0; color:#10b981; font-weight:800;">Mastery Crystallized</h3>
                <p style="font-size:0.95rem; margin:10px 0; color:var(--text-dim);">You have successfully integrated the logic of this chapter into your understanding.</p>
                <button class="btn-done" onclick="markAsDone()">Solidify Progress</button>
            `;
            flow.appendChild(div);
            flow.scrollTo({ top: flow.scrollHeight, behavior: 'smooth' });
        }

        function markAsDone() {
            plan.chapters = plan.chapters.map(c => {
                if (c.title === activeChapterTitle) return { ...c, completed: true };
                return c;
            });
            localStorage.setItem('lumina_active_plan', JSON.stringify(plan));
            window.location.href = 'dashboard.html';
        }

        function handleExit() {
            window.location.href = 'dashboard.html';
        }

        window.onload = () => {
            initTutor();
        };
    </script>
</body>
</html>
