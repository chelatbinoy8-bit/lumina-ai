<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Student Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7000ff;
            --accent-blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --danger: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 10%, rgba(112, 0, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(0, 212, 255, 0.05) 0%, transparent 50%);
        }

        nav {
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            letter-spacing: 3px;
            font-size: 1.4rem;
            background: linear-gradient(to right, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 0.9rem;
        }

        .api-badge {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-blue);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            font-weight: 600;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .logout-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(255, 77, 77, 0.05);
        }

        main {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 50px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .welcome-section {
            grid-column: 1 / -1;
            margin-bottom: 20px;
        }

        .welcome-section h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .welcome-section p {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .glass-panel {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(40px);
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .plan-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .plan-card:hover {
            border-color: var(--accent-purple);
            background: rgba(112, 0, 255, 0.05);
            transform: translateY(-5px);
        }

        .plan-card h3 { font-size: 1.2rem; margin-bottom: 8px; }
        .plan-card p { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 15px; }

        .plan-progress {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: 20px;
        }
        .plan-progress-fill {
            height: 100%;
            background: var(--accent-blue);
            border-radius: 10px;
            transition: width 0.5s ease-out;
        }

        .study-plus {
            margin-top: 30px;
            background: linear-gradient(135deg, rgba(112, 0, 255, 0.1), rgba(0, 212, 255, 0.05));
            border: 1px solid rgba(112, 0, 255, 0.2);
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .study-plus:hover { border-color: var(--accent-blue); }

        .sidebar-stats {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 20px;
        }

        .stat-val { font-size: 1.5rem; font-weight: 800; color: var(--accent-blue); }
        .stat-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .btn-action {
            background: var(--accent-purple);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <nav>
        <div class="logo">LUMINA</div>
        <div class="user-status">
            <div class="api-badge">
                <i data-lucide="zap" size="14"></i>
                AI ACTIVE
            </div>
            <div id="nav-user-name" style="font-weight: 600;">Student</div>
            <div style="width: 35px; height: 35px; border-radius: 50%; background: var(--accent-purple); display: flex; align-items: center; justify-content: center; font-weight: bold;" id="user-initial">S</div>
            <button class="logout-btn" onclick="handleLogout()">
                <i data-lucide="log-out" size="14"></i>
                Logout
            </button>
        </div>
    </nav>

    <main>
        <div class="welcome-section">
            <h1 id="greeting">Hello, Explorer</h1>
            <p>Select a roadmap to continue your personalized learning path.</p>
        </div>

        <div class="main-content">
            <div class="glass-panel">
                <div class="panel-title">
                    <i data-lucide="book-open" style="color: var(--accent-purple);"></i>
                    Your Study Plans
                </div>
                <div id="plans-grid" class="plans-grid">
                    <!-- Study plans loaded from JS -->
                </div>
            </div>

            <div class="glass-panel study-plus" onclick="location.href='study-plus.html'">
                <div class="panel-title" style="justify-content: center;">
                    <i data-lucide="sparkles" style="color: var(--accent-blue);"></i>
                    Create New Roadmap
                </div>
                <p style="font-size: 0.9rem; color: var(--text-dim); margin-bottom: 20px;">
                    Ignite Lumina AI to transform your raw notes into a visual learning journey.
                </p>
                <button class="btn-action">Launch Study Maker</button>
            </div>
        </div>

        <aside class="sidebar-stats">
            <div class="stat-card">
                <div class="stat-label">Knowledge Gained</div>
                <div class="stat-val" id="total-mastery">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Roadmaps</div>
                <div class="stat-val" id="active-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Learning Streak</div>
                <div class="stat-val">1 Day</div>
            </div>
        </aside>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            checkSession();
            syncDataWithDashboard(); // New: Merges dashboard updates back to master list
            loadStudyPlans();
        });

        function checkSession() {
            const rawSession = localStorage.getItem('lumina_session');
            if (rawSession) {
                try {
                    const session = JSON.parse(rawSession);
                    const { name } = session.profile;
                    document.getElementById('greeting').innerText = `Hello, ${name || 'Explorer'}`;
                    document.getElementById('nav-user-name').innerText = name || 'Student';
                    document.getElementById('user-initial').innerText = (name ? name.charAt(0).toUpperCase() : 'S');
                } catch(e) {
                    console.error("Session error", e);
                }
            } else {
                window.location.href = 'index.html';
            }
        }

        /**
         * Crucial Sync Function:
         * Because the dashboard (dashboard.html) updates 'lumina_active_plan', 
         * we must save those changes back into the main 'lumina_plans_list' 
         * so this home screen reflects the updated progress.
         */
        function syncDataWithDashboard() {
            const activePlan = JSON.parse(localStorage.getItem('lumina_active_plan'));
            let allPlans = JSON.parse(localStorage.getItem('lumina_plans_list')) || [];

            if (activePlan) {
                // Find index of this plan in the master list by subject name
                const index = allPlans.findIndex(p => p.subject === activePlan.subject);
                
                if (index !== -1) {
                    // Update existing plan with new chapter statuses
                    allPlans[index] = activePlan;
                } else {
                    // It's a brand new plan, add it to the list
                    allPlans.push(activePlan);
                }
                
                // Save updated master list back to storage
                localStorage.setItem('lumina_plans_list', JSON.stringify(allPlans));
            }
        }

        function loadStudyPlans() {
            const grid = document.getElementById('plans-grid');
            const allPlans = JSON.parse(localStorage.getItem('lumina_plans_list')) || [];
            
            // Clean up duplicates if any
            const uniquePlans = [];
            const map = new Map();
            for (const item of allPlans) {
                if(!map.has(item.subject)){
                    map.set(item.subject, true);
                    uniquePlans.push(item);
                }
            }
            
            if (uniquePlans.length === 0) {
                grid.innerHTML = `<div class="empty-state">No active roadmaps found. Start by creating one!</div>`;
                document.getElementById('total-mastery').innerText = '0%';
                document.getElementById('active-count').innerText = '0';
                return;
            }

            let totalMilestones = 0;
            let completedMilestones = 0;

            grid.innerHTML = '';

            uniquePlans.forEach((plan) => {
                const chapters = plan.chapters || [];
                const done = chapters.filter(c => c.completed).length;
                const total = chapters.length || 0;
                
                totalMilestones += total;
                completedMilestones += done;

                const progress = total > 0 ? Math.round((done / total) * 100) : 0;

                const card = document.createElement('div');
                card.className = 'plan-card';
                card.onclick = () => openPlan(plan);
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <h3>${plan.subject}</h3>
                        <i data-lucide="chevron-right" size="18" style="color: var(--accent-blue);"></i>
                    </div>
                    <p>Milestones: ${total}</p>
                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-dim); margin-top: 10px;">
                        <span>Progress</span>
                        <span>${progress}%</span>
                    </div>
                    <div class="plan-progress">
                        <div class="plan-progress-fill" style="width: ${progress}%"></div>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Update Knowledge Gained (Mastery)
            const mastery = totalMilestones > 0 ? Math.round((completedMilestones / totalMilestones) * 100) : 0;
            document.getElementById('total-mastery').innerText = mastery + '%';
            document.getElementById('active-count').innerText = uniquePlans.length;
            
            lucide.createIcons();
        }

        function openPlan(plan) {
            // Set this as the active plan before navigating
            localStorage.setItem('lumina_active_plan', JSON.stringify(plan));
            window.location.href = 'dashboard.html';
        }

        function handleLogout() {
            localStorage.removeItem('lumina_session');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
