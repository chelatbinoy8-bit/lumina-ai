<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Knowledge Cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7000ff;
            --accent-blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .ambient-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(112, 0, 255, 0.1) 0%, transparent 70%);
            z-index: -1;
            filter: blur(60px);
        }

        #loader-container {
            text-align: center;
            z-index: 10;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--glass-border);
            border-top: 3px solid var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .card-container {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 500px;
            z-index: 5;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header p {
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
            font-weight: 800;
            margin: 0 0 8px 0;
        }

        .header h2 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .flashcard {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1.15rem;
            line-height: 1.7;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            cursor: default;
            margin-bottom: 40px;
            width: 100%;
            box-sizing: border-box;
            max-height: 60vh;
            overflow-y: auto;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover:not(:disabled) {
            background: var(--accent-purple);
            border-color: var(--accent-purple);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .progress-text {
            font-size: 0.9rem;
            color: var(--text-dim);
            font-weight: 600;
            min-width: 80px;
            text-align: center;
        }

        .btn-exit {
            position: absolute;
            top: 30px;
            right: 30px;
            background: none;
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .btn-exit:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        #error-display {
            display: none;
            color: #ff4d4d;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <button class="btn-exit" onclick="window.location.href='dashboard.html'">
        <i data-lucide="x" size="16"></i> Close
    </button>

    <div id="loader-container">
        <div class="spinner"></div>
        <p id="status-text">Lumina is indexing every topic for total coverage...</p>
    </div>

    <div id="error-display">
        <p id="error-msg">Failed to connect to Groq Cloud.</p>
        <button class="btn" style="margin: 20px auto; width: auto; padding: 0 20px;" onclick="location.reload()">Retry</button>
    </div>

    <div class="card-container" id="app-ui">
        <div class="header">
            <p id="subject-label">Subject</p>
            <h2 id="chapter-title">Chapter Title</h2>
        </div>

        <div class="flashcard" id="card-content">
            <!-- Content injected here -->
        </div>

        <div class="controls">
            <button class="btn" id="prev-btn" onclick="changeCard(-1)">
                <i data-lucide="chevron-left"></i>
            </button>
            <span class="progress-text" id="counter">1 / -</span>
            <button class="btn" id="next-btn" onclick="changeCard(1)">
                <i data-lucide="chevron-right"></i>
            </button>
        </div>
    </div>

    <script>
        const plan = JSON.parse(localStorage.getItem('lumina_active_plan'));
        const groqKey = localStorage.getItem('lumina_groq_key');
        
        // PRESERVED LOGIC AS REQUESTED
        const activeChapterTitle = plan?.currentChapter || plan?.chapters?.find(c => !c.completed)?.title || "Chapter";
        const activeChapterDetails = plan?.currentDetails || plan?.chapters?.find(c => !c.completed)?.details || "";

        let flashcards = [];
        let currentIndex = 0;

        async function generateFlashcards() {
            if (!groqKey) {
                showError("No Groq API key found. Please check your settings.");
                return;
            }

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${groqKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {
                                role: "system",
                                content: "You are an exhaustive study assistant. Your goal is to cover EVERY single topic, definition, point, and sub-point found in the provided content. Do NOT limit the number of points. Create as many flashcards as necessary to ensure 100% coverage of the material. Each point should be a concise, stand-alone sentence. Format the output as a simple list where each line starts with a dash (-). Never use placeholders or summary text."
                            },
                            {
                                role: "user",
                                content: `Subject: ${plan.subject}\nChapter: ${activeChapterTitle}\nContent to cover: ${activeChapterDetails}`
                            }
                        ],
                        temperature: 0.3,
                        max_tokens: 2048 // Increased to allow for many cards
                    })
                });

                if (!response.ok) throw new Error("API Limit or Connection Issue");

                const data = await response.json();
                const text = data.choices[0].message.content;

                // Parse the lines into an array
                flashcards = text.split('\n')
                    .map(line => line.replace(/^[-*•\d.]+\s*/, '').trim())
                    .filter(line => line.length > 5);

                if (flashcards.length === 0) throw new Error("Could not parse flashcards.");

                displayUI();
            } catch (error) {
                console.error(error);
                showError(error.message);
            }
        }

        function displayUI() {
            document.getElementById('loader-container').style.display = 'none';
            document.getElementById('app-ui').style.display = 'flex';
            document.getElementById('subject-label').innerText = plan.subject;
            document.getElementById('chapter-title').innerText = activeChapterTitle;
            updateCard();
        }

        function showError(msg) {
            document.getElementById('loader-container').style.display = 'none';
            const errorDiv = document.getElementById('error-display');
            errorDiv.style.display = 'block';
            document.getElementById('error-msg').innerText = msg;
        }

        function updateCard() {
            const card = document.getElementById('card-content');
            card.style.opacity = '0';
            card.style.transform = 'scale(0.95)';

            setTimeout(() => {
                card.innerText = flashcards[currentIndex];
                document.getElementById('counter').innerText = `${currentIndex + 1} / ${flashcards.length}`;
                document.getElementById('prev-btn').disabled = currentIndex === 0;
                
                const nextBtn = document.getElementById('next-btn');
                if (currentIndex === flashcards.length - 1) {
                    nextBtn.innerHTML = '<i data-lucide="check-circle"></i>';
                } else {
                    nextBtn.innerHTML = '<i data-lucide="chevron-right"></i>';
                }

                card.style.opacity = '1';
                card.style.transform = 'scale(1)';
                lucide.createIcons();
            }, 200);
        }

        function changeCard(step) {
            currentIndex += step;
            if (currentIndex >= flashcards.length) {
                // Done! Navigate back
                window.location.href = 'dashboard.html';
                return;
            }
            if (currentIndex < 0) currentIndex = 0;
            updateCard();
        }

        window.onload = () => {
            lucide.createIcons();
            generateFlashcards();
        };
    </script>
</body>
</html>
