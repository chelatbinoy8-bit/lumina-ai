<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | SRS Flashcards</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7000ff;
            --accent-blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Loading State */
        #loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--glass-border);
            border-top: 3px solid var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Main Container */
        .container {
            width: 90%;
            max-width: 500px;
            display: none;
            flex-direction: column;
            gap: 30px;
        }

        .header {
            text-align: center;
        }

        .topic-tag {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-blue);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: inline-block;
        }

        /* Flashcard Styling */
        .card-wrapper {
            perspective: 1000px;
            height: 350px;
            width: 100%;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            backdrop-filter: blur(20px);
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.5;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(145deg, rgba(112, 0, 255, 0.05), rgba(0, 212, 255, 0.05));
            color: var(--text-main);
            font-weight: 400;
            font-size: 1.1rem;
        }

        /* Progress & Controls */
        .progress-container {
            width: 100%;
            height: 6px;
            background: var(--glass-border);
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
            transition: width 0.3s ease;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 24px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover { background: var(--card-hover); border-color: white; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .counter { font-size: 0.9rem; color: var(--text-dim); font-weight: 600; }

        /* Results Screen */
        #results {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .mastery-icon {
            width: 80px;
            height: 80px;
            background: var(--accent-purple);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 30px rgba(112, 0, 255, 0.4);
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color: var(--text-dim); font-weight: 600;">Generating Intelligent Deck...</p>
    </div>

    <div class="container" id="main-ui">
        <div class="header">
            <span class="topic-tag" id="topic-name">Topic</span>
            <h2 id="chapter-title" style="font-size: 1.5rem; margin-bottom: 5px;">Chapter</h2>
        </div>

        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div class="card-wrapper" onclick="flipCard()">
            <div class="card-inner" id="card-inner">
                <div class="card-face card-front" id="card-front">Question loading...</div>
                <div class="card-face card-back" id="card-back">Answer loading...</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="prevBtn" onclick="prevCard()" disabled>
                <i data-lucide="arrow-left"></i>
            </button>
            <div class="counter" id="card-counter">1 / 10</div>
            <button class="btn" id="nextBtn" onclick="nextCard()">
                <span>Next</span>
                <i data-lucide="arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="results" class="container">
        <div class="mastery-icon">
            <i data-lucide="check" color="white" size="40"></i>
        </div>
        <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 10px;">Mastered!</h1>
        <p style="color: var(--text-dim); margin-bottom: 30px;">You've completed the active recall session for this chapter.</p>
        <button class="btn" style="width: 100%; justify-content: center; background: var(--accent-purple);" onclick="goBack()">
            Back to Hub
        </button>
    </div>

    <script>
        const apiKey = ""; // Environment handles this
        let deck = [];
        let currentIndex = 0;

        // Retrieve context from Dashboard
        const plan = JSON.parse(localStorage.getItem('lumina_active_plan'));
        const chapterIdx = localStorage.getItem('lumina_active_chapter_index');
        const chapter = plan ? plan.chapters[chapterIdx] : null;

        async function generateFlashcards() {
            if (!chapter) {
                window.location.href = 'dashboard.html';
                return;
            }

            document.getElementById('topic-name').innerText = plan.subject;
            document.getElementById('chapter-title').innerText = chapter.title;

            const prompt = `Generate a set of 12 highly effective flashcards for the topic "${chapter.title}". 
            Context: ${chapter.details}.
            Each flashcard must have a "question" and a concise "answer".
            Focus on active recall principles.
            Return ONLY a JSON array of objects like: [{"question": "...", "answer": "..."}]`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text;
                deck = JSON.parse(rawText);
                
                showUI();
                updateCard();
            } catch (error) {
                console.error("Failed to generate cards:", error);
                document.getElementById('loader').innerHTML = `<p style="color: #ff3b30;">Error generating deck. Check connection.</p>`;
            }
        }

        function showUI() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            lucide.createIcons();
        }

        function updateCard() {
            const card = deck[currentIndex];
            const inner = document.getElementById('card-inner');
            
            // Reset flip before changing content
            inner.classList.remove('flipped');
            
            setTimeout(() => {
                document.getElementById('card-front').innerText = card.question;
                document.getElementById('card-back').innerText = card.answer;
                
                // Update Progress
                const progress = ((currentIndex + 1) / deck.length) * 100;
                document.getElementById('progress-bar').style.width = `${progress}%`;
                document.getElementById('card-counter').innerText = `${currentIndex + 1} / ${deck.length}`;
                
                // Update Buttons
                document.getElementById('prevBtn').disabled = currentIndex === 0;
                const nextBtn = document.getElementById('nextBtn');
                if (currentIndex === deck.length - 1) {
                    nextBtn.innerHTML = '<span>Finish</span> <i data-lucide="check"></i>';
                } else {
                    nextBtn.innerHTML = '<span>Next</span> <i data-lucide="arrow-right"></i>';
                }
                lucide.createIcons();
            }, 150);
        }

        function flipCard() {
            document.getElementById('card-inner').classList.toggle('flipped');
        }

        function nextCard() {
            if (currentIndex < deck.length - 1) {
                currentIndex++;
                updateCard();
            } else {
                finishSession();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        function finishSession() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('results').style.display = 'flex';
            lucide.createIcons();
        }

        function goBack() {
            window.location.href = 'dashboard.html';
        }

        window.onload = generateFlashcards;
    </script>
</body>
</html>
