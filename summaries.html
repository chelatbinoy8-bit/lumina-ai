<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Smart Summaries</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7000ff;
            --accent-blue: #00d4ff;
            --accent-yellow: #ffd700;
            --accent-green: #00ff88;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --sidebar-w: 320px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: var(--sidebar-w);
            border-right: 1px solid var(--glass-border);
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 10;
        }

        .sidebar-header {
            font-weight: 800;
            font-size: 0.75rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #feedback-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .feedback-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 12px;
            animation: slideIn 0.3s ease-out;
            font-size: 0.9rem;
        }

        .feedback-correct { border-left: 4px solid var(--accent-green); }
        .feedback-wrong { border-left: 4px solid #ff4b4b; }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 60px 40px;
            scroll-behavior: smooth;
        }

        .summary-container {
            max-width: 850px;
            margin: 0 auto;
        }

        .header { margin-bottom: 50px; }
        .header h1 { font-size: 3rem; font-weight: 800; letter-spacing: -1px; }
        .header p { color: var(--accent-blue); font-weight: 700; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }

        .definition-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 20px;
            margin: 24px 0;
        }
        .definition-box strong { color: var(--accent-blue); font-size: 1.1rem; display: block; margin-bottom: 8px; }

        .extra-fact-box {
            border: 1px dashed var(--accent-purple);
            background: rgba(112, 0, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            margin: 24px 0;
        }
        .extra-fact-tag {
            color: var(--accent-purple);
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .highlight-yellow {
            background: rgba(255, 215, 0, 0.15);
            border-bottom: 2px solid var(--accent-yellow);
            color: #fff;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .main-point {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            line-height: 1.7;
            font-size: 1.05rem;
            color: #e0e0e0;
        }
        .point-bullet { color: var(--accent-purple); font-weight: 900; }

        #quiz-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .quiz-card {
            background: #0a0a0a;
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 32px;
            width: 90%;
            max-width: 550px;
        }

        .quiz-option {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 18px 24px;
            margin: 12px 0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
        }

        .quiz-option:hover { 
            border-color: var(--accent-blue); 
            background: rgba(0, 212, 255, 0.05);
        }

        .btn-quiz {
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 60px auto;
            transition: transform 0.2s;
        }

        .btn-quiz:hover { transform: scale(1.02); background: #8224ff; }

        #loading { text-align: center; padding: 120px 20px; }
        .spin { animation: rotate 2s linear infinite; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <i data-lucide="brain-circuit" size="18"></i>
            Progress Insights
        </div>
        <div id="feedback-area">
            <div class="feedback-card" style="color: var(--text-dim); border-style: dashed;">
                The summary is ready. Once you feel confident, click the quiz button at the bottom.
            </div>
        </div>
        <button onclick="location.href='dashboard.html'" style="margin-top: auto; background: var(--glass); border: 1px solid var(--glass-border); color: white; padding: 14px; border-radius: 14px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <i data-lucide="arrow-left" size="16"></i>
            Back to Plan
        </button>
    </aside>

    <main class="content-area">
        <div id="loading">
            <i data-lucide="loader-2" size="48" class="spin" style="color: var(--accent-blue); margin-bottom: 24px;"></i>
            <h2 style="font-weight: 700;">Analyzing Syllabus...</h2>
        </div>

        <div class="summary-container" id="summary-content" style="display: none;">
            <header class="header">
                <p id="sub-tag">Loading...</p>
                <h1 id="chapter-title">Loading...</h1>
            </header>
            
            <div id="dynamic-text"></div>
            
            <button id="start-quiz-btn" class="btn-quiz" style="display: none;" onclick="openQuiz()">
                <i data-lucide="zap"></i>
                Unlock Topic Quiz
            </button>
        </div>
    </main>

    <div id="quiz-overlay">
        <div class="quiz-card">
            <span style="font-size: 0.7rem; color: var(--accent-yellow); font-weight: 800; letter-spacing: 2px; text-transform: uppercase;">Topic Challenge</span>
            <h2 id="quiz-question" style="margin: 20px 0; font-size: 1.4rem; line-height: 1.4;"></h2>
            <div id="quiz-options"></div>
        </div>
    </div>

    <script>
        const groqKey = localStorage.getItem('lumina_groq_key');
        const plan = JSON.parse(localStorage.getItem('lumina_active_plan'));
        const activeIdx = localStorage.getItem('lumina_active_chapter_index') || 0;
        
        let storedQuizData = null;

        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            if (plan && plan.chapters[activeIdx]) {
                const targetChapter = plan.chapters[activeIdx];
                document.getElementById('chapter-title').innerText = targetChapter.title;
                document.getElementById('sub-tag').innerText = plan.subject;
                await generateSummaries(targetChapter);
            } else {
                window.location.href = 'dashboard.html';
            }
        });

        async function generateSummaries(chapter) {
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${groqKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {
                                role: "system",
                                content: `You are an AI teacher. 
                                Rule 1: Output JSON. 
                                Rule 2: NEVER include HTML tags in the text fields (definitions, points, quiz question, etc.). 
                                Rule 3: Strictly follow the syllabus details.
                                JSON Schema: { "definitions": [{"term":"", "definition":""}], "points": [{"text":"", "isHighlighted":boolean}], "extra_facts": [{"title":"", "text":""}], "narrative": "", "sudden_quiz": {"question":"", "options":[], "correct_index":0, "explanation":""} }`
                            },
                            {
                                role: "user",
                                content: `Subject: ${plan.subject}. Topic: ${chapter.title}. Syllabus Details: ${chapter.details}.`
                            }
                        ],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const content = JSON.parse(data.choices[0].message.content);
                storedQuizData = content.sudden_quiz;
                renderContent(content);

            } catch (err) {
                document.getElementById('loading').innerHTML = "<h3>Sync Error</h3><p>Ensure your API key is valid.</p>";
            }
        }

        function renderContent(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('summary-content').style.display = 'block';
            const container = document.getElementById('dynamic-text');
            let html = ``;

            if(data.definitions?.length > 0) {
                data.definitions.forEach(d => {
                    html += `<div class="definition-box"><strong>${d.term}</strong><p>${d.definition}</p></div>`;
                });
            }

            html += `<h3 style="margin: 40px 0 20px; font-weight: 800; color: var(--accent-blue);">Core Concepts</h3>`;
            data.points.forEach((p, i) => {
                const text = p.isHighlighted ? `<span class="highlight-yellow">${p.text}</span>` : p.text;
                html += `<div class="main-point"><span class="point-bullet">${(i+1)}</span><div>${text}</div></div>`;
            });

            html += `<h3 style="margin: 40px 0 20px; font-weight: 800; color: var(--accent-blue);">Theory Walkthrough</h3>`;
            html += `<div style="line-height: 1.8; color: #ccc; font-size: 1.1rem; margin-bottom: 40px;">${data.narrative}</div>`;

            if(data.extra_facts?.length > 0) {
                data.extra_facts.forEach(f => {
                    html += `<div class="extra-fact-box"><span class="extra-fact-tag">Extra Fact: ${f.title}</span><p>${f.text}</p></div>`;
                });
            }

            container.innerHTML = html;
            document.getElementById('start-quiz-btn').style.display = 'flex';
            lucide.createIcons();
        }

        function openQuiz() {
            if (!storedQuizData) return;
            const overlay = document.getElementById('quiz-overlay');
            document.getElementById('quiz-question').innerText = storedQuizData.question;
            const optContainer = document.getElementById('quiz-options');
            optContainer.innerHTML = '';
            
            storedQuizData.options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'quiz-option';
                div.innerText = opt;
                div.onclick = () => selectAnswer(idx);
                optContainer.appendChild(div);
            });

            overlay.style.display = 'flex';
        }

        function selectAnswer(idx) {
            document.getElementById('quiz-overlay').style.display = 'none';
            const isCorrect = idx === storedQuizData.correct_index;
            const feedback = document.getElementById('feedback-area');

            const card = document.createElement('div');
            card.className = `feedback-card ${isCorrect ? 'feedback-correct' : 'feedback-wrong'}`;
            card.innerHTML = `
                <div style="font-weight: 800; margin-bottom: 5px; color: ${isCorrect ? 'var(--accent-green)' : '#ff4b4b'}">
                    ${isCorrect ? 'Concept Mastered' : 'Needs Review'}
                </div>
                <p style="color: white; font-size: 0.85rem;">${storedQuizData.explanation}</p>
            `;
            feedback.prepend(card);
            
            // Auto-scroll to top of sidebar to see feedback
            feedback.scrollTop = 0;
        }
    </script>
</body>
</html>
