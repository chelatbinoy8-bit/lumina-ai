<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Study Plan Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7000ff;
            --accent-blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --error: #ff3b30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 10%, rgba(112, 0, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
        }

        .maker-card {
            width: 95%;
            max-width: 600px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            backdrop-filter: blur(40px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .step { display: none; animation: fadeIn 0.4s ease forwards; }
        .step.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { font-size: 1.8rem; margin-bottom: 10px; font-weight: 800; letter-spacing: -0.5px; }
        p.subtitle { color: var(--text-dim); margin-bottom: 30px; font-size: 0.95rem; line-height: 1.5; }

        #apiOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
        }

        .api-modal {
            background: #111;
            padding: 40px;
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            width: 420px;
            text-align: center;
        }

        .form-group { margin-bottom: 25px; text-align: left; }
        label { display: block; margin-bottom: 10px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; color: var(--accent-blue); }
        
        input[type="text"], input[type="date"], input[type="password"] {
            width: 100%;
            background: #121212;
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 14px;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        .upload-zone {
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            background: rgba(255,255,255,0.01);
            transition: 0.3s;
        }
        .upload-zone:hover { border-color: var(--accent-purple); background: rgba(255,255,255,0.03); }

        .progress-track { background: var(--glass-border); height: 8px; border-radius: 10px; overflow: hidden; margin-top: 20px; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(to right, var(--accent-purple), var(--accent-blue)); transition: 0.4s ease; }
        .ai-status { font-size: 0.75rem; color: var(--accent-blue); margin-top: 12px; font-family: monospace; text-transform: uppercase; letter-spacing: 1px; }

        .btn-primary {
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1rem;
        }

        .error-box {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div id="apiOverlay">
        <div class="api-modal">
            <i data-lucide="shield-check" size="40" style="color: var(--accent-purple); margin-bottom: 20px;"></i>
            <h3>Groq Authentication</h3>
            <p style="color: var(--text-dim); font-size: 0.85rem; margin: 10px 0 25px;">Enter your Groq API key (starts with gsk_)</p>
            <div class="form-group">
                <input type="password" id="groqKeyInput" placeholder="gsk_xxxxxxxxxxxxxx">
            </div>
            <button class="btn-primary" onclick="saveKey()">Initialize Engine</button>
        </div>
    </div>

    <div class="ambient-bg"></div>

    <div class="maker-card">
        <div class="step active" id="step1">
            <h2>Set Your Milestone</h2>
            <p class="subtitle">Define your goal and target date.</p>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="subjectInput" placeholder="e.g. Human Anatomy, Machine Learning...">
            </div>
            <div class="form-group">
                <label>Target Date</label>
                <input type="date" id="goalDate">
            </div>
            <button class="btn-primary" onclick="goToStep2()">Continue <i data-lucide="chevron-right" size="18"></i></button>
        </div>

        <div class="step" id="step2">
            <h2>Import Content</h2>
            <p class="subtitle">Upload your full .txt file. Llama 3 will map every single chapter exactly as written.</p>
            <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
                <i data-lucide="upload-cloud" size="48" style="color: var(--accent-blue); margin-bottom: 15px;"></i>
                <div style="font-weight: 700;">Select .txt File</div>
                <input type="file" id="fileInput" hidden onchange="handleFile(this)" accept=".txt">
            </div>
            <div id="processingSection" style="display: none;">
                <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
                <div class="ai-status" id="aiStatus">Preparing Full-Text Extraction...</div>
            </div>
            <div id="errorDisplay" class="error-box"></div>
        </div>
    </div>

    <script>
        let groqApiKey = localStorage.getItem('lumina_groq_key') || "";
        if(groqApiKey) document.getElementById('apiOverlay').style.display = 'none';

        function saveKey() {
            const key = document.getElementById('groqKeyInput').value.trim();
            if(!key.startsWith('gsk_')) return alert("Invalid Key");
            localStorage.setItem('lumina_groq_key', key);
            groqApiKey = key;
            document.getElementById('apiOverlay').style.display = 'none';
        }

        function goToStep2() {
            if(!document.getElementById('subjectInput').value || !document.getElementById('goalDate').value) return alert("Fill all fields");
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            lucide.createIcons();
        }

        async function handleFile(input) {
            const file = input.files[0];
            if(!file) return;
            const text = await file.text();
            document.getElementById('processingSection').style.display = 'block';
            processSyllabus(text);
        }

        async function processSyllabus(syllabus) {
            const subject = document.getElementById('subjectInput').value;
            const date = document.getElementById('goalDate').value;
            
            updateStatus("Mapping Complete Roadmap...", 30);

            // REFINED PROMPT: Focuses on structure and verbatim detail rather than summary.
            const systemPrompt = `You are a High-Fidelity Academic Transcriber. 
            Your goal is to transform a raw text file into a structured curriculum without losing ANY information.

            OUTPUT FORMAT: 
            Return ONLY a JSON object: {"chapters": [{"title": "...", "tagline": "...", "details": "...", "completed": false}]}.

            EXTRACTION RULES:
            1. DO NOT SKIP: You must identify and extract EVERY chapter/section in the provided text. If there are 6 chapters, I expect exactly 6 items in the JSON array.
            2. VERBATIM DETAILS: The 'details' field must contain the FULL, ORIGINAL, UNABRIDGED text for that chapter. Do not summarize the content. Copy it word-for-word.
            3. PREVIEW TAGLINE: Create a short (max 12 words) punchy tagline for the dashboard preview.
            4. HIERARCHY: If you see headers like "Chapter 1", "Section 2", etc., use those as titles.
            5. LANGUAGE: If the input text is not in English (e.g., Malayalam/Hindi), keep the 'details' in the original language but translate the 'tagline' and 'title' to English for the UI.`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${groqApiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: `Subject: ${subject}\n\nCONTENT TO EXTRACT FULLY:\n${syllabus}` }
                        ],
                        response_format: { type: "json_object" },
                        temperature: 0, // Set to 0 for maximum reliability/consistency
                        max_tokens: 16000 // Increased limit to ensure no cutoff on long notes
                    })
                });

                const rawData = await response.json();
                
                if (rawData.error) throw new Error(rawData.error.message);
                
                const planData = JSON.parse(rawData.choices[0].message.content);
                
                // Final check to ensure we didn't get an empty array
                if(!planData.chapters || planData.chapters.length === 0) throw new Error("No chapters detected. Check file content.");

                localStorage.setItem('lumina_active_plan', JSON.stringify({
                    subject: subject,
                    targetDate: date,
                    chapters: planData.chapters
                }));

                updateStatus("Engine Synced. Redirecting...", 100);
                setTimeout(() => window.location.href = 'dashboard.html', 1000);

            } catch (e) {
                console.error(e);
                document.getElementById('errorDisplay').innerText = "Engine Error: " + e.message;
                document.getElementById('errorDisplay').style.display = 'block';
                updateStatus("Extraction Failed.", 0);
            }
        }

        function updateStatus(msg, prog) {
            document.getElementById('aiStatus').innerText = msg;
            document.getElementById('progressBar').style.width = prog + '%';
        }

        lucide.createIcons();
    </script>
</body>
</html>
