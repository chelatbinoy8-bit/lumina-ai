<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030303;
            --accent-color: #7000ff;
            --accent-secondary: #00d4ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --error: #ff4b4b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Fixed Sophisticated Background */
        .blur-bg {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 15%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(0, 212, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #050505 0%, #000 100%);
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            z-index: 10;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            position: relative;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .logo {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: 4px;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(to right, #fff, var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tabs {
            display: flex;
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            margin-bottom: 30px;
            padding: 4px;
            position: relative;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            z-index: 1;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.3s;
            color: var(--text-dim);
        }

        .tab.active { color: #000; }

        .tab-slider {
            position: absolute;
            height: calc(100% - 8px);
            width: calc(50% - 4px);
            background: #fff;
            border-radius: 10px;
            top: 4px;
            left: 4px;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 5px;
        }

        input {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 16px 20px;
            border-radius: 16px;
            color: #fff;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--accent-secondary);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .btn-auth {
            margin-top: 10px;
            padding: 18px;
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-auth:hover {
            background: #821aff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3);
        }

        #message {
            font-size: 0.85rem;
            text-align: center;
            min-height: 20px;
            margin-top: 10px;
        }

        .error { color: var(--error); }
        .success { color: var(--accent-secondary); }

        /* --- ONBOARDING OVERLAY --- */
        #onboarding {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .onboarding-card {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .onboarding-card h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 800;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .step { display: none; animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .step.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="blur-bg"></div>

    <div class="auth-container" id="auth-ui">
        <div class="glass-card">
            <div class="logo">LUMINA</div>
            
            <div class="tabs">
                <div class="tab-slider" id="slider"></div>
                <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
                <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
            </div>

            <form id="auth-form" onsubmit="handleAuth(event)">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth" id="submit-btn">Continue</button>
                <div id="message"></div>
            </form>
        </div>
    </div>

    <!-- Onboarding Flow -->
    <div id="onboarding">
        <div class="onboarding-card">
            <div id="step-1" class="step active">
                <h2 id="welcome-msg">Welcome to Lumina</h2>
                <p style="color: var(--text-dim); margin-bottom: 30px;">Let's personalize your experience. What's your name?</p>
                <input type="text" id="user-name" placeholder="Enter your name" style="width: 100%; margin-bottom: 20px;">
                <button class="btn-auth" style="width: 100%;" onclick="nextStep(2)">Next</button>
            </div>

            <div id="step-2" class="step">
                <h2>Your Journey</h2>
                <p style="color: var(--text-dim); margin-bottom: 30px;">How old are you? This helps us calibrate the AI level.</p>
                <input type="number" id="user-age" placeholder="Age" style="width: 100%; margin-bottom: 20px;">
                <button class="btn-auth" style="width: 100%;" onclick="nextStep(3)">Next</button>
            </div>

            <div id="step-3" class="step">
                <h2>The Challenge</h2>
                <p style="color: var(--text-dim); margin-bottom: 30px;">Which subjects do you find most difficult?</p>
                <input type="text" id="user-subjects" placeholder="e.g. Quantum Physics, Organic Chemistry" style="width: 100%; margin-bottom: 20px;">
                <button class="btn-auth" style="width: 100%;" onclick="finishOnboarding()">Complete Setup</button>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'login';

        function switchTab(mode) {
            currentMode = mode;
            const slider = document.getElementById('slider');
            const loginTab = document.getElementById('tab-login');
            const regTab = document.getElementById('tab-register');
            const msg = document.getElementById('message');
            
            msg.innerHTML = '';
            
            if (mode === 'login') {
                slider.style.transform = 'translateX(0)';
                loginTab.classList.add('active');
                regTab.classList.remove('active');
            } else {
                slider.style.transform = 'translateX(calc(100% + 4px))';
                regTab.classList.add('active');
                loginTab.classList.remove('active');
            }
        }

        function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('message');

            let users = JSON.parse(localStorage.getItem('lumina_users') || '[]');

            if (currentMode === 'register') {
                const existing = users.find(u => u.email === email);
                if (existing) {
                    msg.className = 'error';
                    msg.innerHTML = 'Email already registered.';
                    return;
                }
                users.push({ email, pass, onboarded: false });
                localStorage.setItem('lumina_users', JSON.stringify(users));
                msg.className = 'success';
                msg.innerHTML = 'Registration successful! Now log in.';
                setTimeout(() => switchTab('login'), 1200);
            } else {
                const user = users.find(u => u.email === email && u.pass === pass);
                if (user) {
                    msg.className = 'success';
                    msg.innerHTML = 'Accessing Lumina...';
                    localStorage.setItem('lumina_session', JSON.stringify(user));

                    setTimeout(() => {
                        if (!user.onboarded) {
                            startOnboarding();
                        } else {
                            // Using a custom message box instead of alert to maintain sophistication
                            msg.innerHTML = "Welcome back! Redirecting...";
                        }
                    }, 800);
                } else {
                    msg.className = 'error';
                    msg.innerHTML = 'Account not found or invalid credentials.';
                }
            }
        }

        function startOnboarding() {
            document.getElementById('auth-ui').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-ui').style.display = 'none';
                const ob = document.getElementById('onboarding');
                ob.style.display = 'flex';
            }, 300);
        }

        function nextStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${step}`).classList.add('active');
        }

        function finishOnboarding() {
            const name = document.getElementById('user-name').value;
            const age = document.getElementById('user-age').value;
            const subjects = document.getElementById('user-subjects').value;
            const session = JSON.parse(localStorage.getItem('lumina_session'));

            if(!name || !age || !subjects) return;

            let users = JSON.parse(localStorage.getItem('lumina_users'));
            const userIndex = users.findIndex(u => u.email === session.email);
            
            users[userIndex].onboarded = true;
            users[userIndex].profile = { name, age, subjects };
            
            localStorage.setItem('lumina_users', JSON.stringify(users));
            localStorage.setItem('lumina_session', JSON.stringify(users[userIndex]));

            // Final transition
            document.querySelector('.onboarding-card').innerHTML = `
                <h2 style="font-size: 3rem;">Ready, ${name}.</h2>
                <p style="color: var(--text-dim);">Your personalized mastery path is being prepared.</p>
            `;
        }

        switchTab('login');
    </script>
</body>
</html>
