<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Guided Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7000ff;
            --accent-blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --success: #00ff88;
            --warning: #ffcc00;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .exam-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .question-area {
            flex: 1;
            padding: 40px 60px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--glass-border);
        }

        .exam-header {
            margin-bottom: 30px;
        }

        .exam-header p {
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            margin: 0;
        }

        .exam-header h1 {
            font-size: 1.8rem;
            margin: 10px 0;
            font-weight: 800;
        }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: var(--glass);
            border-radius: 2px;
            margin-top: 20px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-blue);
            width: 0%;
            transition: 0.5s ease;
            box-shadow: 0 0 10px var(--accent-blue);
        }

        .question-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 20px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .question-type-tag {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(112, 0, 255, 0.2);
            border: 1px solid var(--accent-purple);
            border-radius: 6px;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: var(--accent-purple);
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 18px 24px;
            border-radius: 12px;
            color: white;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
        }

        .option-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent-blue);
        }

        .option-btn.selected {
            background: rgba(112, 0, 255, 0.2);
            border-color: var(--accent-purple);
        }

        .writing-area {
            width: 100%;
            min-height: 200px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            color: white;
            font-family: inherit;
            resize: vertical;
            font-size: 1rem;
            line-height: 1.6;
            outline: none;
        }

        .writing-area:focus {
            border-color: var(--accent-blue);
        }

        .guide-sidebar {
            width: 380px;
            background: rgba(255,255,255,0.01);
            display: flex;
            flex-direction: column;
            padding: 40px;
            backdrop-filter: blur(20px);
        }

        .guide-status {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-blue);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        #guide-content {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-dim);
        }

        .hint-box {
            background: rgba(112, 0, 255, 0.08);
            border: 1px solid rgba(112, 0, 255, 0.3);
            border-left: 4px solid var(--accent-purple);
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
            font-style: italic;
            color: var(--text-main);
        }

        .btn-action {
            background: var(--accent-blue);
            color: black;
            border: none;
            padding: 18px 30px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }

        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 2px solid var(--glass-border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p id="loader-text">LUMINA IS AUTHENTICATING CONTEXT...</p>
    </div>

    <div class="exam-layout">
        <div class="question-area">
            <div class="exam-header">
                <p id="subject-tag">Subject</p>
                <h1 id="chapter-title">Guided Assessment</h1>
                <div class="progress-bar-container">
                    <div class="progress-fill" id="progress"></div>
                </div>
            </div>

            <div id="question-container">
                <!-- Question loads here -->
            </div>

            <button class="btn-action" id="submit-btn" onclick="handleSubmit()">Authenticate Response</button>
        </div>

        <div class="guide-sidebar">
            <div class="guide-status">
                <i data-lucide="sparkles" size="16"></i>
                Lumina's Presence
            </div>
            <div id="guide-content">
                Take a breath. This isn't just a test; it's a verification of your literary and linguistic depth.
            </div>
            
            <div id="hint-container"></div>
        </div>
    </div>

    <script>
        const plan = JSON.parse(localStorage.getItem('lumina_active_plan')) || { subject: "Malayalam", chapters: [] };
        const groqKey = localStorage.getItem('lumina_groq_key');
        
        const activeChapterTitle = plan?.currentChapter || "Literature Chapter";
        const activeChapterDetails = plan?.currentDetails || "";
        const subject = plan.subject || "General";

        let questions = [];
        let currentIdx = 0;
        let selectedOption = null;

        async function generateExam() {
            if (!groqKey) {
                document.getElementById('loader').innerHTML = "<p>Lumina Key Missing.</p>";
                return;
            }

            // Determine specific prompt logic based on subject
            let systemPrompt = `You are the Exam Module of Lumina. Generate 5 precise questions for the topic: ${activeChapterTitle}.`;
            
            if (subject.toLowerCase() === 'malayalam') {
                systemPrompt += `
                STRICT RULE for Malayalam:
                1. Include 1 Literature question (Author name or Type of literature/Genre like story/poem).
                2. Include 1 Grammar question: splitting words (Vigrahippuka) or similar words (Paryayam).
                3. Include 1 'One Word' question.
                4. Include 1 Creative Writing prompt (Diary entry or short Essay prompt).
                5. Include 1 Descriptive answer question.
                Format: JSON object { "questions": [{ "type": "mcq|writing", "question": "string", "options": ["str", "str", "str", "str"] (if mcq), "correctIndex": number (if mcq) }] }
                Use Malayalam script for the actual content.`;
            } else if (subject.toLowerCase() === 'hindi') {
                systemPrompt += `
                STRICT RULE for Hindi:
                1. Include 1 Literature question (Author/Writer or Genre).
                2. Include 1 Grammar question: specifically finding 'Visheshan' (Adjective) or gender/number.
                3. Include 1 One-word answer or matching.
                4. Include 1 Creative prompt (Anuched/Essay or Patra/Diary).
                5. Include 1 Long answer question.
                Format: JSON object { "questions": [{ "type": "mcq|writing", "question": "string", "options": ["str", "str", "str", "str"] (if mcq), "correctIndex": number (if mcq) }] }
                Use Devanagari script for content.`;
            } else {
                systemPrompt += `Standard high-level MCQs. Format: JSON { "questions": [...] }`;
            }

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${groqKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: `Generate assessment for ${subject} chapter: ${activeChapterTitle}. Context: ${activeChapterDetails}` }
                        ],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const parsed = JSON.parse(data.choices[0].message.content);
                questions = parsed.questions || [];
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('subject-tag').innerText = subject;
                document.getElementById('chapter-title').innerText = activeChapterTitle;
                renderQuestion();
            } catch (e) {
                console.error(e);
                document.getElementById('loader-text').innerText = "Recalibrating linguistic models...";
                setTimeout(generateExam, 3000);
            }
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            const container = document.getElementById('question-container');
            selectedOption = null;
            
            const btn = document.getElementById('submit-btn');
            btn.innerText = q.type === 'writing' ? "Validate Expression" : "Authenticate Reasoning";
            btn.disabled = false;
            btn.style.background = "var(--accent-blue)";

            let html = `<div class="question-card">
                <span class="question-type-tag">${q.type === 'writing' ? 'Subjective/Creative' : 'Linguistic Precision'}</span>
                <div class="question-text">${q.question}</div>`;

            if (q.type === 'writing') {
                html += `<textarea class="writing-area" id="user-writing" placeholder="Construct your response here..."></textarea>`;
            } else {
                html += `<div class="options-grid">
                    ${q.options.map((opt, i) => `
                        <button class="option-btn" onclick="selectOpt(${i}, this)">${opt}</button>
                    `).join('')}
                </div>`;
            }

            html += `</div>`;
            container.innerHTML = html;

            const progress = (currentIdx / questions.length) * 100;
            document.getElementById('progress').style.width = `${progress}%`;
            document.getElementById('hint-container').innerHTML = '';
            lucide.createIcons();
        }

        function selectOpt(idx, btn) {
            selectedOption = idx;
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        async function handleSubmit() {
            const q = questions[currentIdx];
            const btn = document.getElementById('submit-btn');

            if (q.type === 'mcq') {
                if (selectedOption === null) return;
                if (selectedOption === q.correctIndex) {
                    proceed();
                } else {
                    btn.disabled = true;
                    getNudge(q, q.options[selectedOption]);
                }
            } else {
                const text = document.getElementById('user-writing').value;
                if (text.length < 10) return;
                btn.innerText = "Evaluating...";
                btn.disabled = true;
                // AI Feedback for writing
                await evaluateWriting(q, text);
            }
        }

        async function evaluateWriting(q, text) {
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${groqKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "You are Lumina. Evaluate the student's writing based on the chapter theme. If it is relevant and shows effort, 'Approve' it. Otherwise, provide a helpful suggestion." },
                            { role: "user", content: `Question: ${q.question}. Student Answer: ${text}` }
                        ]
                    })
                });
                const data = await response.json();
                const feedback = data.choices[0].message.content;
                
                document.getElementById('hint-container').innerHTML = `<div class="hint-box">${feedback}</div>`;
                const btn = document.getElementById('submit-btn');
                btn.innerText = "Proceed to Next";
                btn.disabled = false;
                btn.onclick = proceed;
            } catch (e) { proceed(); }
        }

        function proceed() {
            const btn = document.getElementById('submit-btn');
            btn.onclick = handleSubmit; // Reset
            currentIdx++;
            if (currentIdx >= questions.length) {
                finishExam();
            } else {
                renderQuestion();
            }
        }

        async function getNudge(questionObj, chosenAnswer) {
            const hintContainer = document.getElementById('hint-container');
            hintContainer.innerHTML = '<div class="hint-box" style="opacity: 0.6;">Refining context...</div>';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${groqKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "Lumina: Provide a 1-sentence hint for the language question without giving the answer. Focus on the grammatical rule or literary context." },
                            { role: "user", content: `Q: ${questionObj.question}. Incorrect choice: ${chosenAnswer}.` }
                        ]
                    })
                });
                const data = await response.json();
                hintContainer.innerHTML = `<div class="hint-box">${data.choices[0].message.content}</div>`;
                document.getElementById('submit-btn').disabled = false;
            } catch (e) {
                hintContainer.innerHTML = `<div class="hint-box">Re-read the passage carefully.</div>`;
                document.getElementById('submit-btn').disabled = false;
            }
        }

        function finishExam() {
            document.getElementById('progress').style.width = `100%`;
            document.getElementById('question-container').innerHTML = `
                <div class="question-card" style="text-align: center; padding: 50px;">
                    <i data-lucide="award" size="64" style="color: var(--success); margin-bottom: 24px;"></i>
                    <h2 style="font-size: 2rem;">Linguistic Mastery Verified</h2>
                    <p style="color: var(--text-dim); margin-bottom: 30px;">Your command over ${subject} has been authenticated.</p>
                    <button class="btn-action" onclick="location.reload()">Review Again</button>
                </div>
            `;
            lucide.createIcons();
        }

        window.onload = () => {
            lucide.createIcons();
            generateExam();
        };
    </script>
</body>
</html>
